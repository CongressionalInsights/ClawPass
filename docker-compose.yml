services:
  clawpass:
    build:
      context: .
    ports:
      - "8081:8081"
    environment:
      CLAWPASS_HOST: 0.0.0.0
      CLAWPASS_PORT: 8081
      CLAWPASS_DB_PATH: /data/clawpass.db
      CLAWPASS_EXPECTED_ORIGIN: http://localhost:8081
      CLAWPASS_RP_ID: localhost
      CLAWPASS_RP_NAME: ClawPass
    volumes:
      - clawpass-data:/data

volumes:
  clawpass-data:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawPass Approval</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <header class="topbar">
      <div>
        <h1>ClawPass</h1>
        <p class="subtitle">Approval gate</p>
      </div>
      <div class="status" id="global-status">Loading</div>
    </header>
    <main class="layout">
      <section class="panel">
        <h2>Approval Request</h2>
        <div class="summary" id="request-summary">Loading request…</div>
        <div class="summary" id="auth-summary">Checking approver session…</div>
        <div class="actions">
          <a id="btn-login" class="btn" href="/login">Sign in</a>
          <button id="btn-approve" class="btn btn-primary">Approve with passkey</button>
          <button id="btn-deny" class="btn">Deny with passkey</button>
        </div>
      </section>
      <section class="log-panel">
        <h3>Activity</h3>
        <pre id="log"></pre>
      </section>
    </main>
    <script type="module" src="/assets/approve.js"></script>
  </body>
</html>

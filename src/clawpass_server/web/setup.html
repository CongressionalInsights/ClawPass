<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawPass Setup</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <header class="topbar">
      <div>
        <h1>ClawPass</h1>
        <p class="subtitle">Secure bootstrap</p>
      </div>
      <div class="status" id="global-status">Ready</div>
    </header>
    <main class="layout">
      <section class="panel">
        <h2>Bootstrap Admin</h2>
        <div class="grid">
          <label>
            Bootstrap token
            <input id="bootstrap-token" type="password" placeholder="Configured on the host" />
          </label>
          <label>
            Admin email
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
          </label>
        </div>
        <div class="grid">
          <label>
            Display name
            <input id="display-name" type="text" placeholder="Primary operator" autocomplete="name" />
          </label>
        </div>
        <p class="note" id="device-hint"></p>
        <div class="actions">
          <button id="btn-bootstrap" class="btn btn-primary">Create admin passkey</button>
        </div>
      </section>
      <section class="log-panel">
        <h3>Activity</h3>
        <pre id="log"></pre>
      </section>
    </main>
    <script type="module" src="/assets/setup.js"></script>
  </body>
</html>

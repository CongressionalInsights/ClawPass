<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawPass Operator App</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <header class="topbar">
      <div>
        <h1>ClawPass</h1>
        <p class="subtitle">Operator app</p>
      </div>
      <div class="actions">
        <span class="status" id="global-status">Loading</span>
        <button id="btn-logout" class="btn">Log out</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Admin Session</h2>
        <div class="summary" id="session-summary">Loading session…</div>
      </section>

      <section class="panel">
        <h2>Security</h2>
        <div class="summary" id="security-summary">Loading approver state…</div>
        <div class="actions">
          <button id="btn-passkey" class="btn btn-primary">Add passkey</button>
          <button id="btn-passkey-cross" class="btn">Use another device</button>
          <button id="btn-ledger-webauthn" class="btn">Add Ledger key</button>
          <button id="btn-ledger-eth" class="btn">Add Ledger Ethereum signer</button>
        </div>
        <p class="note" id="device-hint"></p>
      </section>

      <section class="panel">
        <h2>Producers</h2>
        <div class="grid">
          <label>
            Producer name
            <input id="producer-name" type="text" placeholder="scotty-agent" />
          </label>
          <label>
            Description
            <input id="producer-description" type="text" placeholder="Primary agent gateway producer" />
          </label>
        </div>
        <div class="actions">
          <button id="btn-create-producer" class="btn btn-primary">Create producer</button>
          <button id="btn-refresh-producers" class="btn">Refresh producers</button>
        </div>
        <div class="summary" id="key-output">No newly issued key.</div>
        <div id="producer-list" class="request-list"></div>
      </section>

      <section class="panel">
        <h2>Approvers</h2>
        <div class="grid">
          <label>
            Invite email
            <input id="invite-email" type="email" placeholder="approver@example.com" autocomplete="email" />
          </label>
          <label>
            Display name
            <input id="invite-display-name" type="text" placeholder="Secondary approver" autocomplete="name" />
          </label>
        </div>
        <div class="actions">
          <button id="btn-create-invite" class="btn btn-primary">Create invite</button>
          <button id="btn-refresh-approvers" class="btn">Refresh approvers</button>
        </div>
        <div class="summary" id="invite-output">No active invite selected.</div>
        <div id="approver-list" class="request-list"></div>
      </section>

      <section class="panel">
        <h2>Webhook Ops</h2>
        <div class="summary" id="webhook-health">Loading webhook health…</div>
        <div class="summary" id="webhook-summary-meta"></div>
        <div class="alert-list" id="webhook-alerts"></div>
        <div class="metrics-grid" id="webhook-stats"></div>
        <div class="actions">
          <button id="btn-refresh-webhooks" class="btn">Refresh webhook metrics</button>
          <button id="btn-prune-webhooks" class="btn">Prune old history</button>
        </div>
        <div id="webhook-endpoint-list" class="request-list"></div>
      </section>
    </main>

    <section class="log-panel">
      <h3>Activity</h3>
      <pre id="log"></pre>
    </section>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
